<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DayOS">
<meta name="theme-color" content="#0a0a0f">
<title>DayOS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
body { background: #0a0a0f; color: #e8e4d9; min-height: 100vh; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
.app { max-width: 480px; margin: 0 auto; padding: 20px 20px 100px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 10px; }
.logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
.logo span { color: #7c6af7; }
.date { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
.streak { background: #1a1a2e; border: 1px solid #7c6af7; color: #7c6af7; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
.section-title { font-size: 12px; color: #7c6af7; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.section-sub { font-size: 12px; color: #666; margin-bottom: 20px; }
.card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.card-title { font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 12px; text-align: center; }
.stat-v { font-size: 22px; font-weight: 700; }
.stat-l { font-size: 9px; color: #555; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.bars { display: flex; gap: 6px; align-items: flex-end; height: 60px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; border-radius: 3px; min-height: 4px; transition: height 0.4s; }
.bar-lbl { font-size: 9px; color: #444; }
.status-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
.status-row:last-child { border-bottom: none; }
.check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; margin-right: 10px; }
.check.done { background: #4ade80; border-color: #4ade80; color: #0a0a0f; }
.btn-sm { background: transparent; border: 1px solid #7c6af7; color: #7c6af7; border-radius: 8px; padding: 4px 12px; font-size: 11px; cursor: pointer; }
label { display: block; font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; margin-top: 14px; }
input, textarea { width: 100%; background: #111118; border: 1px solid #1e1e2e; border-radius: 10px; padding: 12px; color: #e8e4d9; font-size: 16px; font-family: inherit; -webkit-appearance: none; }
textarea { resize: none; font-size: 13px; line-height: 1.6; }
input[type="range"] { -webkit-appearance: none; background: transparent; padding: 0; border: none; accent-color: #7c6af7; }
.btn { width: 100%; background: #7c6af7; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 14px; font-weight: 600; margin-top: 16px; cursor: pointer; font-family: inherit; }
.btn:disabled { background: #1e1e2e; color: #555; }
.btn2 { width: 100%; background: transparent; border: 1px solid #333; color: #888; border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
.ai-box { background: #111118; border: 1px solid #7c6af7; border-radius: 12px; padding: 18px; margin-bottom: 14px; }
.ai-box .card-title { color: #7c6af7; }
.ai-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a2e; }
.toggle-row:last-child { border-bottom: none; }
.toggle { width: 42px; height: 24px; border-radius: 12px; background: #333; position: relative; cursor: pointer; flex-shrink: 0; }
.toggle.on { background: #7c6af7; }
.toggle::after { content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: white; transition: left 0.2s; }
.toggle.on::after { left: 21px; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #0d0d15; border-top: 1px solid #1e1e2e; display: flex; padding: 8px 0 calc(env(safe-area-inset-bottom) + 8px); }
.nav button { flex: 1; background: none; border: none; color: #444; padding: 8px 0; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nav button.active { color: #7c6af7; }
.nav-icon { font-size: 20px; }
.nav-lbl { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
.empty { text-align: center; padding: 30px 20px; color: #555; font-size: 13px; border: 1px dashed #333; border-radius: 12px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: flex-end; }
.modal { background: #13131f; width: 100%; max-width: 480px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 24px 20px calc(env(safe-area-inset-bottom) + 24px); }
.modal h2 { font-size: 18px; margin-bottom: 10px; }
.modal p { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 16px; }
.modal a { color: #7c6af7; }
.err { color: #f87171; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>

<div class="app" id="app"></div>

<nav class="nav">
  <button onclick="go('dashboard')" id="n-dashboard" class="active"><span class="nav-icon">⚡</span><span class="nav-lbl">Today</span></button>
  <button onclick="go('morning')" id="n-morning"><span class="nav-icon">☀️</span><span class="nav-lbl">Morning</span></button>
  <button onclick="go('evening')" id="n-evening"><span class="nav-icon">🌙</span><span class="nav-lbl">Evening</span></button>
  <button onclick="go('coach')" id="n-coach"><span class="nav-icon">🎯</span><span class="nav-lbl">Coach</span></button>
</nav>

<div class="modal-bg" id="keyModal" style="display:none">
  <div class="modal">
    <h2>Connect DayOS</h2>
    <p>Enter your free OpenRouter API key. Get one at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> — no credit card, no age limit.</p>
    <input type="password" id="keyInput" placeholder="sk-or-v1-..." style="margin-bottom:12px">
    <button class="btn" onclick="saveKey()">Save & Continue</button>
  </div>
</div>

<script>
const TODAY = new Date().toISOString().split('T')[0];
const IDEAL = "PB is 15, student, founder of FlowForge automation, trains badminton+weights. Ideal day: wake 5-6AM, exercise+protein+coffee, morning reading, 2hr deep work, 20min nap, free time, night routine, sleep 10PM. Wants: freedom, direction. Struggles: drift, scrolling, late nights.";

let logs = JSON.parse(localStorage.getItem('dayos_logs') || '[]');
let key = localStorage.getItem('dayos_key') || '';
let screen = 'dashboard';
let ai = '';
let loading = false;
let err = '';

let mForm = { wake: '', energy: 3, notes: '' };
let eForm = { sleep: '', ex: false, dw: false, mr: false, nr: false, wins: '', losses: '' };

function save() { localStorage.setItem('dayos_logs', JSON.stringify(logs)); }
function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v) return;
  key = v;
  localStorage.setItem('dayos_key', v);
  document.getElementById('keyModal').style.display = 'none';
}
function todayLog() { return logs.find(l => l.date === TODAY) || {}; }
function updateToday(d) {
  const i = logs.findIndex(l => l.date === TODAY);
  if (i >= 0) logs[i] = { ...logs[i], ...d };
  else logs.push({ date: TODAY, ...d });
  save();
}
function score(l) {
  if (!l || (!l.m && !l.e)) return null;
  let s = 0;
  const wh = parseInt((l.m?.wake || '10:00').split(':')[0]);
  const sh = parseInt((l.e?.sleep || '23:00').split(':')[0]);
  if (wh <= 6) s += 2; else if (wh <= 8) s += 1;
  if (sh <= 22) s += 2; else if (sh <= 23) s += 1;
  if (l.ex) s += 2;
  if (l.dw) s += 2;
  if (l.mr) s += 1;
  if (l.nr) s += 1;
  return Math.min(10, s);
}
function scoreColor(s) {
  if (s === null) return '#1e1e2e';
  if (s >= 7) return '#4ade80';
  if (s >= 4) return '#facc15';
  return '#f87171';
}
function getStreak() {
  const sorted = [...logs].sort((a,b) => new Date(b.date) - new Date(a.date));
  let n = 0;
  for (const l of sorted) { if (score(l) >= 5) n++; else break; }
  return n;
}

const MODELS = [
  'meta-llama/llama-3.3-70b-instruct:free',
  'google/gemma-2-9b-it:free',
  'mistralai/mistral-7b-instruct:free',
  'meta-llama/llama-3.2-3b-instruct:free'
];

async function askAI(prompt) {
  if (!key) { document.getElementById('keyModal').style.display = 'flex'; throw new Error('No key'); }
  let lastErr = '';
  for (const m of MODELS) {
    try {
      const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key, 'HTTP-Referer': 'https://dayos.app', 'X-Title': 'DayOS' },
        body: JSON.stringify({ model: m, max_tokens: 800, messages: [{ role: 'user', content: prompt }] })
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); lastErr = (e.error && e.error.message) || ('HTTP ' + r.status); continue; }
      const d = await r.json();
      const t = d.choices && d.choices[0] && d.choices[0].message && d.choices[0].message.content;
      if (t) return t;
      lastErr = 'Empty reply from ' + m;
    } catch (e) { lastErr = e.message; }
  }
  throw new Error(lastErr || 'All models failed');
}

function go(s) { screen = s; ai = ''; err = ''; render(); }

function render() {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('n-' + screen).classList.add('active');
  const app = document.getElementById('app');
  if (screen === 'dashboard') app.innerHTML = renderDash();
  else if (screen === 'morning') app.innerHTML = renderMorning();
  else if (screen === 'evening') app.innerHTML = renderEvening();
  else if (screen === 'coach') app.innerHTML = renderCoach();
}

function header() {
  const streak = getStreak();
  const date = new Date().toLocaleDateString('en', { weekday: 'long', month: 'short', day: 'numeric' });
  return `<div class="header"><div><div class="date">${date}</div><div class="logo">Day<span>OS</span></div></div>${streak > 0 ? `<div class="streak">🔥 ${streak}d</div>` : ''}</div>`;
}

function renderDash() {
  const streak = getStreak();
  const scored = logs.filter(l => score(l) !== null);
  const avg = scored.length ? (scored.reduce((s,l) => s + score(l), 0) / scored.length).toFixed(1) : '—';
  const tl = todayLog();
  const last7 = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (6-i));
    const ds = d.toISOString().split('T')[0];
    const l = logs.find(x => x.date === ds);
    return { lbl: d.toLocaleDateString('en',{weekday:'short'}).substring(0,2).toUpperCase(), s: score(l) };
  });
  const bars = last7.map(x => {
    const h = x.s !== null ? Math.max(4, (x.s/10)*52) : 4;
    return `<div class="bar-col"><div class="bar" style="height:${h}px;background:${scoreColor(x.s)}"></div><div class="bar-lbl">${x.lbl}</div></div>`;
  }).join('');
  const lastAI = tl.e?.response || tl.m?.response;
  return header() + `
    <div class="section-title">Overview</div>
    <div class="section-sub" style="margin-bottom:20px">Your real trajectory.</div>
    <div class="stats">
      <div class="stat"><div class="stat-v">${streak || '—'}</div><div class="stat-l">Streak</div></div>
      <div class="stat"><div class="stat-v">${avg}</div><div class="stat-l">Avg</div></div>
      <div class="stat"><div class="stat-v">${logs.length}</div><div class="stat-l">Logged</div></div>
    </div>
    <div class="card"><div class="card-title">Last 7 Days</div><div class="bars">${bars}</div></div>
    <div class="card">
      <div class="card-title">Today</div>
      <div class="status-row"><div><span class="check ${tl.m ? 'done' : ''}">${tl.m ? '✓' : ''}</span>Morning briefing</div>${!tl.m ? `<button class="btn-sm" onclick="go('morning')">Start →</button>` : ''}</div>
      <div class="status-row"><div><span class="check ${tl.e ? 'done' : ''}">${tl.e ? '✓' : ''}</span>Evening check-in</div>${!tl.e ? `<button class="btn-sm" onclick="go('evening')">Start →</button>` : ''}</div>
    </div>
    ${lastAI ? `<div class="ai-box"><div class="card-title">${tl.e?.response ? "Tonight's Debrief" : "Today's Game Plan"}</div><div class="ai-text">${escapeHtml(lastAI)}</div></div>` : `<div class="empty">Complete your morning briefing to get today's AI game plan</div>`}
  `;
}

function renderMorning() {
  if (ai) return header() + `<div class="section-title">Morning Briefing</div><div class="section-sub">Your game plan</div><div class="ai-box"><div class="card-title">Today's Plan</div><div class="ai-text">${escapeHtml(ai)}</div></div><button class="btn2" onclick="go('dashboard')">Back to Dashboard</button>`;
  if (loading) return header() + `<div class="empty" style="padding:60px 20px">🧠 Building your game plan...</div>`;
  return header() + `
    <div class="section-title">Morning Briefing</div>
    <div class="section-sub">Tell DayOS how you started</div>
    <label>Wake Time</label>
    <input type="time" id="wakeTime" value="${mForm.wake}" onchange="mForm.wake=this.value">
    <label>Energy: <span id="eVal">${mForm.energy}</span>/5</label>
    <input type="range" min="1" max="5" value="${mForm.energy}" oninput="mForm.energy=this.value;document.getElementById('eVal').textContent=this.value">
    <label>Notes (optional)</label>
    <textarea id="mNotes" rows="3" placeholder="Events today, how you feel..." onchange="mForm.notes=this.value">${mForm.notes}</textarea>
    ${err ? `<div class="err">${err}</div>` : ''}
    <button class="btn" onclick="submitMorning()">Get Game Plan →</button>
  `;
}

async function submitMorning() {
  mForm.wake = document.getElementById('wakeTime').value;
  mForm.notes = document.getElementById('mNotes').value;
  if (!mForm.wake) { err = 'Please enter wake time'; render(); return; }
  loading = true; err = ''; render();
  try {
    const p = `You are DayOS, a direct coach for PB. ${IDEAL}\n\nToday PB woke at ${mForm.wake}, energy ${mForm.energy}/5. Notes: "${mForm.notes || 'none'}"\n\nGive a sharp morning briefing:\n1. One sentence assessment\n2. Today's 3 priorities\n3. One thing to watch for\n4. One direct closer\n\nUnder 180 words. Direct, no fluff.`;
    const r = await askAI(p);
    updateToday({ m: { ...mForm, response: r } });
    ai = r;
  } catch(e) { err = e.message; }
  loading = false; render();
}

function renderEvening() {
  if (ai) return header() + `<div class="section-title">Evening Debrief</div><div class="section-sub">Day closed</div><div class="ai-box"><div class="card-title">Tonight's Debrief</div><div class="ai-text">${escapeHtml(ai)}</div></div><button class="btn2" onclick="go('dashboard')">Back to Dashboard</button>`;
  if (loading) return header() + `<div class="empty" style="padding:60px 20px">🧠 Analyzing your day...</div>`;
  const tog = (k, l) => `<div class="toggle-row"><span>${l}</span><div class="toggle ${eForm[k] ? 'on' : ''}" onclick="eForm.${k}=!eForm.${k};render()"></div></div>`;
  return header() + `
    <div class="section-title">Evening Check-In</div>
    <div class="section-sub">2 minutes. Close the day right.</div>
    <label>Sleep Time Last Night</label>
    <input type="time" id="sleepTime" value="${eForm.sleep}" onchange="eForm.sleep=this.value">
    <div class="card" style="margin-top:16px"><div class="card-title">Today</div>${tog('ex','Exercised')}${tog('dw','Deep work')}${tog('mr','Morning routine')}${tog('nr','Night routine')}</div>
    <label>Wins</label>
    <textarea id="eWins" rows="2" placeholder="What went well?" onchange="eForm.wins=this.value">${eForm.wins}</textarea>
    <label>Where You Slipped</label>
    <textarea id="eLosses" rows="2" placeholder="What drained you?" onchange="eForm.losses=this.value">${eForm.losses}</textarea>
    ${err ? `<div class="err">${err}</div>` : ''}
    <button class="btn" onclick="submitEvening()">Close the Day →</button>
  `;
}

async function submitEvening() {
  eForm.sleep = document.getElementById('sleepTime').value;
  eForm.wins = document.getElementById('eWins').value;
  eForm.losses = document.getElementById('eLosses').value;
  loading = true; err = ''; render();
  const tl = todayLog();
  try {
    const p = `You are DayOS, a direct coach for PB. ${IDEAL}\n\nTonight:\n- Slept at: ${eForm.sleep}\n- Exercised: ${eForm.ex}\n- Deep work: ${eForm.dw}\n- Morning routine: ${eForm.mr}\n- Night routine: ${eForm.nr}\n- Wins: "${eForm.wins}"\n- Losses: "${eForm.losses}"\n${tl.m ? `- Morning energy: ${tl.m.energy}/5, woke ${tl.m.wake}` : ''}\n\nGive end-of-day debrief:\n1. Score 1-10 with one sentence\n2. What made or broke today\n3. Action for tomorrow morning\n4. One closing line\n\nUnder 150 words. Direct.`;
    const r = await askAI(p);
    updateToday({ e: { ...eForm, response: r }, ex: eForm.ex, dw: eForm.dw, mr: eForm.mr, nr: eForm.nr });
    ai = r;
  } catch(e) { err = e.message; }
  loading = false; render();
}

function renderCoach() {
  if (ai) return header() + `<div class="section-title">Trajectory</div><div class="ai-box"><div class="card-title">Analysis</div><div class="ai-text">${escapeHtml(ai)}</div></div><button class="btn2" onclick="ai='';render()">Analyze Again</button>`;
  if (loading) return header() + `<div class="empty" style="padding:60px 20px">🧠 Reading your patterns...</div>`;
  if (logs.length < 3) return header() + `<div class="section-title">Life Coach</div><div class="section-sub">AI reads your patterns honestly</div><div class="empty">📊<br><br>Log at least 3 days first.<br><br>${logs.length}/3 days</div>`;
  return header() + `
    <div class="section-title">Life Coach</div>
    <div class="section-sub">AI reads your patterns and tells you the truth</div>
    <div class="card"><div class="card-title">Data</div>${logs.length} days logged · Last ${Math.min(logs.length,14)} analyzed</div>
    ${err ? `<div class="err">${err}</div>` : ''}
    <button class="btn" onclick="submitCoach()">Analyze My Trajectory →</button>
  `;
}

async function submitCoach() {
  loading = true; err = ''; render();
  try {
    const recent = logs.slice(-14).map(l => ({ date: l.date, woke: l.m?.wake, energy: l.m?.energy, ex: l.ex, dw: l.dw, wins: l.e?.wins, losses: l.e?.losses, score: score(l) }));
    const p = `You are DayOS, honest coach for PB. ${IDEAL}\n\nLast ${recent.length} days:\n${JSON.stringify(recent)}\n\nGive brutally honest trajectory analysis:\n1. Patterns forming (good AND bad)\n2. #1 habit dragging PB down\n3. #1 habit working — reinforce it\n4. At this trajectory, where in 6 months?\n5. Most important change this week\n\nUnder 300 words. Direct, no fluff.`;
    ai = await askAI(p);
  } catch(e) { err = e.message; }
  loading = false; render();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

if (!key) document.getElementById('keyModal').style.display = 'flex';
render();
</script>
</body>
</html>
